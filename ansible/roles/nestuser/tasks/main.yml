---

- name: Check current group state (name and gid)
  ansible.builtin.command: getent group {{ user_username }}
  register: _group_entry
  changed_when: false
  failed_when: false
  become: true

# getent group output: groupname:password:gid:members
- name: Parse existing group GID
  ansible.builtin.set_fact:
    _existing_gid: "{{ _group_entry.stdout.split(':')[2] | default('') }}"
  when: _group_entry.rc == 0

- name: Delete group if GID does not match desired value
  ansible.builtin.group:
    name: "{{ user_username }}"
    state: absent
  become: true
  when:
    - _group_entry.rc == 0
    - _existing_gid | string != group_id | string

- name: Ensure group exists with correct name and GID
  become: true
  ansible.builtin.group:
    name: "{{ user_username }}"
    gid: "{{ group_id }}"
    state: present

# AIX /usr/bin/bash
# linux /bin/bash

- name: Set /bin/ksh aix shell
  ansible.builtin.set_fact:
    user_shell: '/bin/ksh'
  when:
    - ansible_architecture == 'chrp'

- name: Check current user state (name and uid)
  ansible.builtin.command: getent passwd {{ user_username }}
  register: _user_entry
  changed_when: false
  failed_when: false
  become: true

# getent passwd output: username:password:uid:gid:comment:home:shell
- name: Parse existing user UID
  ansible.builtin.set_fact:
    _existing_uid: "{{ _user_entry.stdout.split(':')[2] | default('') }}"
  when: _user_entry.rc == 0

- name: Delete user if UID does not match desired value
  ansible.builtin.user:
    name: '{{ user_username }}'
    state: absent
    remove: false
  become: true
  when:
    - _user_entry.rc == 0
    - _existing_uid | string != user_id | string

- name: Ensure User is Present
  become: true
  ansible.builtin.user:
    name: '{{ user_username }}'
    uid: '{{ user_id }}'
    group: '{{ user_username }}'
    password: "{{ user_password | password_hash('sha512') }}"
    generate_ssh_key: true
    shell: '{{ user_shell }}'
    state: present

- name: Authorized_key
  ansible.builtin.authorized_key:
    user: "{{ user_username }}"
    state: present
    manage_dir: true
    key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

- name: Ensure sudoers.d directory exists
  ansible.builtin.file:
    path: /etc/sudoers.d
    state: directory
    mode: '0750'
  become: true

- name: Add user to sudoers via sudoers.d
  ansible.builtin.copy:
    content: "{{ user_username }} ALL=(ALL) NOPASSWD: ALL\n"
    dest: "/etc/sudoers.d/{{ user_username }}"
    mode: '0440'
    validate: 'visudo -cf %s'
  become: true

- name: Update linux /etc/security/limits
  when: ansible_system == 'Linux'
  block:
    - name: Nest hard ulimit nofile
      ansible.builtin.lineinfile:
        path: /etc/security/limits.conf
        state: present
        regexp: "{{ user_username }} hard"
        line: "{{ user_username }} hard nofile 20000"
        backup: true
        create: true
        mode: '0644'
      become: true

    - name: Nest soft ulimit nofile
      ansible.builtin.lineinfile:
        path: /etc/security/limits.conf
        state: present
        regexp: "{{ user_username }} soft"
        line: "{{ user_username }} soft nofile 20000"
        backup: true
        create: true
        mode: '0644'
      become: true

- name: Nest ulimit nofile
  ansible.builtin.lineinfile:
    path: /etc/security/limits
    state: present
    regexp: 'nofiles = 2000'
    line: 'nofiles = 20000'
    backup: true
  become: true
  when:
    - ansible_architecture == 'chrp'

- name: Opt directory owner
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    recurse: false
    owner: "{{ user_username }}"
    group: "{{ user_username }}"
    mode: '0755'
  with_items:
    - '/opt'
  become: true
