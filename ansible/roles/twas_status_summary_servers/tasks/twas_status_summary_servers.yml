---
- name: Check if tWAS serverStatus
  ansible.builtin.stat:
    path: "{{ install_base }}/{{ twas_dir }}/profiles/{{ profile_name }}/bin/serverStatus{{ ext }}"
  register: isServerStatus

- name: tWAS versions
  when: isServerStatus.stat.exists
  block:

  - name: Summary of tWAS server status
    ansible.builtin.shell:
      cmd: |
        set -o pipefail
        {{ install_base }}/{{ twas_dir }}/profiles/{{ profile_name }}/bin/serverStatus{{ ext }} -all -username {{ twas_username }} -password {{ twas_password }}|egrep 'ADMU0508I:|ADMU0509I:'|grep -v 'ManagedLibertyServer' || true
      executable: /bin/bash
    register: twasstatus

  - name: Create status dir
    delegate_to: localhost
    ansible.builtin.file:
      path: "{{ logs_dir }}/{{ env_name }}/{{ ansible_fqdn }}"
      state: directory
      mode: '0755'

  - name: Size of stdout_lines
    ansible.builtin.set_fact:
      max_counter: "{{ twasstatus.stdout_lines | length }}"


# The command below can return 0, even though it fails:
#  /opt/WAS/profiles/dmgr/bin/serverStatus.sh -all -username persona1 -password ppersona1
# ADMU0116I: Tool information is being logged in file
#            /opt/WAS/profiles/dmgr/logs/serverStatus.log
# ADMU0128I: Starting tool with the dmgr profile
# ADMU0503I: Retrieving server status for all servers
# ADMU0505I: Servers found in configuration:
# ADMU0506I: Server name: dmgr
# ADMU0002E: Exception attempting to process server dmgr:
#            com.ibm.websphere.management.exception.ConnectorException:
#            ADMC0009E: The system failed to make the SOAP RPC call:
#            getServerMBean
# nest@nest-twas-qs90-dmgr1:~> echo $?
# 0


  - name: Set server STOPPED when serverStatus returned no parseable output
    ansible.builtin.set_fact:
      twas_server_name_status: [{"server": "unknown", "status": "STOPPED. Error. serverStatus failed to return status"}]
    when: max_counter | int == 0

  - name: Create list with server name / status
    ansible.builtin.set_fact:
      # NOTE: the get_twas_server_status -> plugins/filter/get_twas_server_name
      twas_server_name_status: >-
        {{ twas_server_name_status | default([]) +
           [ { "server": twasstatus.stdout_lines[item] | ibm_community_automation.ibm_community_automation.get_twas_server_name,
               "status": twasstatus.stdout_lines[item] } ] }}
    loop: "{{ range(0, max_counter | int) | list }}"
    loop_control:
      label: ""
    no_log: true
    when: max_counter | int > 0

  - name: Debug twas_server_name_status list
    ansible.builtin.debug:
      msg: "{{ twas_server_name_status }}"

  - name: New dict server status
    ansible.builtin.set_fact:
      versions: "{{{ ansible_fqdn : twas_server_name_status }}}"

  - name: Write server status json file
    delegate_to: localhost
    ansible.builtin.copy:
      content: "{{ versions | to_nice_json( sort_keys=false ) }}"
      dest: "{{ logs_dir }}/{{ env_name }}/{{ ansible_fqdn }}/{{ status_json_file }}"
      mode: '0444'
